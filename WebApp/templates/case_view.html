<!DOCTYPE html>
<html>
<head>
    <title>{{ filename }} - Case CV-26-00008</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body { font-family: monospace; margin: 20px; }
        .header { margin-bottom: 20px; padding: 10px; background: #f5f5f5; }
        .content { 
            white-space: pre-wrap; 
            padding: 20px; 
            background: #fafafa; 
            border: 1px solid #ddd;
            max-height: 80vh;
            overflow-y: auto;
        }
        .back { margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <h2>{{ filename }}</h2>
        <p>Path: {{ file_path }}</p>
    </div>

    <div class="back">
        <a href="/case?path={{ file_path.rsplit('/', 1)[0] if '/' in file_path else '' }}">
            ← Back to Folder
        </a>
    </div>

    <div class="content">{{ content }}</div>

    <hr>
    <p><a href="/case">← Case Root</a> | <a href="/dashboard">Dashboard</a> | <a href="/">Home</a></p>
</body>
</html>
